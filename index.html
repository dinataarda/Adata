<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center - Adata Dashboard (Pro Blue)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- NEON BLUE DARK THEME --- */
        :root {
            --bg-dark: #000000;
            --bg-light: #080b12; 
            --card-bg: #12151e; 
            --border-color: #2a3143;
            --accent-core: #0044ff; 
            --neon-highlight: #00bfff; 
            --text-body: rgba(255, 255, 255, 0.9);
            --text-label: rgba(255, 255, 255, 0.5);
        }

        body {
            background: radial-gradient(circle at top center, var(--bg-light), var(--bg-dark) 100%);
            color: var(--text-body);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
            letter-spacing: -0.2px;
        }

        .title-section h2 { font-weight: 800; letter-spacing: -1.5px; color: #fff; }
        .title-section h2 span { color: var(--neon-highlight); text-shadow: 0 0 15px rgba(0, 191, 255, 0.4); }
        .sub-teks { color: var(--text-label); margin-bottom: 30px; }

        .glass-card {
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        .section-title { 
            border-left: 4px solid var(--accent-core); 
            padding-left: 15px; 
            margin-bottom: 25px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .form-label { 
            font-weight: 600; 
            color: var(--text-label); 
            font-size: 0.75rem; 
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-control {
            background: #05070a !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-body) !important;
            border-radius: 8px;
            padding: 12px 15px;
            transition: 0.2s;
        }

        .form-control:focus {
            border-color: var(--neon-highlight) !important;
            box-shadow: 0 0 0 2px rgba(0, 191, 255, 0.2) !important;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-core), var(--neon-highlight));
            border: none;
            color: white;
            padding: 16px; 
            border-radius: 8px;
            font-weight: 800;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0, 68, 255, 0.3);
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
            box-shadow: 0 6px 20px rgba(0, 68, 255, 0.5);
        }
        .btn-primary:disabled { background: #333; box-shadow: none; filter: grayscale(1); cursor: not-allowed; }

        .form-switch .form-check-input:checked {
            background-color: var(--accent-core);
            border-color: var(--accent-core);
        }

        .inventory-list { max-height: 800px; overflow-y: auto; }
        .item-card { background: #0c0f17; border: 1px solid #1a202c; border-radius: 12px; transition: 0.2s; }
        .item-card:hover { border-color: var(--accent-core); box-shadow: 0 0 10px rgba(0, 68, 255, 0.1); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-core); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container-fluid">
    <div class="title-section text-center text-lg-start mt-3">
        <h2>Adata <span>Dashboard</span></h2>
        <p class="sub-teks small">Seller Center • Multi-Upload & Auto-Clean</p>
    </div>

    <div class="row">
        <div class="col-lg-7">
            <form id="productForm" class="glass-card">
                <h5 class="section-title">Upload Produk Baru</h5>
                
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" id="nama" class="form-control" placeholder="Contoh: Kemeja Oversize" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">SKU</label>
                        <input type="text" id="sku" class="form-control" placeholder="ADT-001">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Harga Jual</label>
                        <input type="number" id="harga" class="form-control" placeholder="0" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Harga Coret</label>
                        <input type="number" id="harga_coret" class="form-control" placeholder="0">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Stok</label>
                        <input type="number" id="stok" class="form-control" placeholder="0" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Kategori</label>
                        <input type="text" id="kategori" class="form-control" placeholder="Ketik kategori" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Brand</label>
                        <input type="text" id="brand" class="form-control" placeholder="Merk">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Berat (Gr)</label>
                        <input type="number" id="berat_gram" class="form-control" placeholder="500">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Foto Produk (Pilih Maksimal 5 Foto)</label>
                    <input type="file" id="foto_file" class="form-control" accept="image/*" multiple required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="deskripsi" class="form-control" rows="2" placeholder="Detail produk..."></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Varian (JSON)</label>
                        <textarea id="varian" class="form-control" rows="1" placeholder='{"warna": ["hitam"]}'></textarea>
                    </div>
                    <div class="col-md-2 mb-3"> <label class="form-label">Rating</label> <input type="number" id="rating_avg" class="form-control" step="0.1" value="4.8"> </div>
                    <div class="col-md-2 mb-3"> <label class="form-label">Ulasan</label> <input type="number" id="review_count" class="form-control" value="0"> </div>
                    <div class="col-md-2 mb-3"> <label class="form-label">Terjual</label> <input type="number" id="terjual" class="form-control" value="0"> </div>
                </div>

                <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="is_active" checked>
                    <label class="form-check-label text-white" style="font-size: 0.85rem;">Tampilkan Produk ke Pembeli</label>
                </div>

                <button type="submit" id="btnUpload" class="btn-primary">Sikat ke Database</button>
            </form>
        </div>

        <div class="col-lg-5">
            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold m-0" style="color: var(--neon-highlight);">Live Inventory (<span id="val-total">0</span>)</h6>
                    <button class="btn btn-sm btn-outline-secondary border-0" onclick="loadData()">Refresh</button>
                </div>
                <div id="listBarang" class="inventory-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createClient } = supabase;
    const supabaseUrl = 'https://xrlulcclqvxnefohbigf.supabase.co';
    const supabaseKey = 'sb_publishable_Wc70ySWSpeotdvEDN4UIaQ_VxNzY8J0';
    const db = createClient(supabaseUrl, supabaseKey);

    async function loadData() {
        const { data, error } = await db.from('inventory').select('*').order('created_at', { ascending: false });
        if (error) return alert("Gagal muat data: " + error.message);
        
        const list = document.getElementById('listBarang');
        document.getElementById('val-total').innerText = data.length;
        list.innerHTML = data.length ? '' : '<p class="text-muted text-center py-4">Kosong, cuy.</p>';

        data.forEach(item => {
            // Ambil thumbnail dari array gambar pertama
            let thumbUrl = 'https://via.placeholder.com/55?text=No+Img';
            let fotoCount = 0;
            if (Array.isArray(item.image_url) && item.image_url.length > 0) {
                thumbUrl = item.image_url[0];
                fotoCount = item.image_url.length;
            } else if (typeof item.image_url === 'string' && item.image_url.startsWith('http')) {
                thumbUrl = item.image_url;
                fotoCount = 1;
            }

            list.innerHTML += `
            <div class="item-card mb-3 p-3">
                <div class="d-flex justify-content-between align-items-start">
                    <div class="d-flex align-items-center w-100">
                        <div style="position: relative; margin-right: 15px;">
                            <img src="${thumbUrl}" style="width: 55px; height: 55px; object-fit: cover; border-radius: 8px; border: 1px solid #2a3143;">
                            <span class="badge bg-dark" style="position: absolute; bottom: -5px; right: -5px; font-size: 0.6rem; border: 1px solid var(--accent-core);">${fotoCount} pic</span>
                        </div>
                        <div class="w-100">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="badge" style="background: rgba(0, 191, 255, 0.1); color: #00bfff; border: 1px solid rgba(0, 191, 255, 0.3); font-weight: 600; letter-spacing: 0.5px;">
                                    ${item.sku || 'NO-SKU'}
                                </span>
                                <button class="btn btn-sm" style="background: rgba(255, 51, 102, 0.1); color: #ff3366; border: 1px solid rgba(255, 51, 102, 0.3); border-radius: 6px; font-weight: 600; font-size: 0.75rem; padding: 4px 10px;" onclick="hapusBarang('${item.id}')">Hapus</button>
                            </div>
                            <div class="fw-bold text-white mb-1" style="font-size: 0.95rem;">${item.nama}</div>
                            <div class="d-flex justify-content-between align-items-center">
                                <div style="color: var(--neon-highlight); font-size: 0.9rem; font-weight: 700;">Rp ${Number(item.harga).toLocaleString('id-ID')}</div>
                                <div style="color: #6c757d; font-size: 0.75rem;">Stok: <span class="text-white">${item.stok}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    }

    document.getElementById('productForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnUpload');
        const fileInput = document.getElementById('foto_file');
        const files = fileInput.files;

        if (files.length === 0) return alert("Pilih foto dulu, Boss!");
        if (files.length > 5) return alert("Maksimal 5 foto aja biar nggak berat!");

        btn.innerText = `UPLOADING ${files.length} FOTO...`;
        btn.disabled = true;

        let uploadedUrls = [];

        // Upload loop
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileExt = file.name.split('.').pop();
            const fileName = `PROD_${Date.now()}_${i}.${fileExt}`;
            
            const { error: uploadError } = await db.storage.from('foto-produk').upload(fileName, file);
            
            if (uploadError) {
                btn.innerText = "Sikat ke Database";
                btn.disabled = false;
                return alert(`Gagal upload foto ke-${i+1}: ` + uploadError.message);
            }

            const { data: publicUrlData } = db.storage.from('foto-produk').getPublicUrl(fileName);
            uploadedUrls.push(publicUrlData.publicUrl);
        }

        // Insert to DB
        const payload = {
            nama: document.getElementById('nama').value,
            sku: document.getElementById('sku').value,
            harga: parseInt(document.getElementById('harga').value),
            harga_coret: parseInt(document.getElementById('harga_coret').value) || null,
            stok: parseInt(document.getElementById('stok').value),
            kategori: document.getElementById('kategori').value,
            brand: document.getElementById('brand').value,
            berat_gram: parseInt(document.getElementById('berat_gram').value) || 0,
            image_url: uploadedUrls, 
            deskripsi: document.getElementById('deskripsi').value,
            rating_avg: parseFloat(document.getElementById('rating_avg').value) || 4.8,
            review_count: parseInt(document.getElementById('review_count').value) || 0,
            terjual: parseInt(document.getElementById('terjual').value) || 0,
            is_active: document.getElementById('is_active').checked,
            varian: document.getElementById('varian').value ? JSON.parse(document.getElementById('varian').value) : null
        };

        const { error: dbError } = await db.from('inventory').insert([payload]);
        if (dbError) {
            alert("Database Error: " + dbError.message);
        } else {
            loadData();
            this.reset();
        }

        btn.innerText = "Sikat ke Database";
        btn.disabled = false;
    });

    async function hapusBarang(id) {
        if (!confirm("Yakin mau hapus barang ini?")) return;

        // 1. Ambil data URL foto dulu sebelum row di DB dihapus
        const { data: itemData } = await db.from('inventory').select('image_url').eq('id', id).single();

        // 2. Hapus data di tabel Database
        const { error: dbErr } = await db.from('inventory').delete().eq('id', id);
        if (dbErr) return alert("Gagal hapus DB: " + dbErr.message);

        // 3. Mesin Pembersih: Ekstrak dan hapus file fisik dari Storage Supabase
        if (itemData && itemData.image_url) {
            let urls = Array.isArray(itemData.image_url) ? itemData.image_url : [itemData.image_url];
            
            for (let url of urls) {
                if (typeof url === 'string' && url.includes('foto-produk')) {
                    let fileName = url.split('/').pop();
                    await db.storage.from('foto-produk').remove([fileName]);
                }
            }
        }

        // 4. Refresh tampilan
        loadData();
    }

    loadData();
</script>
</body>
</html>
